<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">

        <!-- Google Fonts -->
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300..700&display=swap" rel="stylesheet">

        <!-- CSS -->
        <link rel="stylesheet" href="style.css">
        <title>Game of War</title>
    </head>
    <body>
        <h1>Game of War</h1>
        <main>
            <div class="board">
                <div class="computer-deck">
                    <span id="computer-count" class="card-count"></span>
                    <div id="computer-deck" class="deck-slot"></div>
                </div>

                <div class="card-slots">
                    <div id="computer-slot" class="card-slot"></div>
                    <span id="round-result" class="round-result">CPU vs PLAYER</span>
                    <div id="player-slot" class="card-slot"></div>
                </div>

                <div class="player-deck">
                    <span id="player-count" class="card-count"></span>
                    <div id="player-deck" class="deck-slot"></div>
                </div>
            </div>

            <div class="game-controls">
                <button id="draw-card">Draw</button>

                <button id="new-deck" class="new-deck-btn">Start new game</button>
            </div>
        </main>
        
        <script src="index.js" type="module"></script>
    </body>
</html>
